<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Katan — Live Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #181824;
    --bg-section: #0e0e16;
    --border: #1e1e2e;
    --border-subtle: #16161f;
    --text-primary: #e0e0e8;
    --text-secondary: #6b6b80;
    --text-dim: #44445a;
    --accent-green: #3dd68c;
    --accent-red: #f0506e;
    --accent-orange: #f5a623;
    --openai: #10a37f;
    --anthropic: #d97706;
    --vertexai: #4285f4;
    --bedrock: #f0c040;
    --azure: #a78bfa;
    --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    font-family: var(--font-sans);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 14px;
    margin-left: 8px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-red);
    transition: background 0.3s;
  }

  .status-dot.connected {
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .stat strong {
    color: var(--text-primary);
    font-size: 16px;
    margin-right: 4px;
  }

  .btn {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: #2a2a3a;
  }

  .btn.active {
    background: #1a1a2a;
    color: var(--accent-green);
    border-color: var(--accent-green);
  }

  /* ── Stats Bar ── */
  .stats-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 12px;
  }

  .stats-bar .stats-label {
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
    font-weight: 600;
  }

  .stats-bar .stats-total {
    color: var(--text-primary);
    font-size: 18px;
    font-weight: 700;
    margin-right: 4px;
  }

  .stats-bar .stats-total-label {
    color: var(--text-secondary);
    font-size: 12px;
  }

  .stats-bar .stats-providers {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }

  .stats-bar .stats-provider {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stats-bar .stats-provider-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  .stats-bar .stats-provider-dot.openai { background: var(--openai); }
  .stats-bar .stats-provider-dot.anthropic { background: var(--anthropic); }
  .stats-bar .stats-provider-dot.vertexai { background: var(--vertexai); }
  .stats-bar .stats-provider-dot.bedrock { background: var(--bedrock); }
  .stats-bar .stats-provider-dot.azure_openai { background: var(--azure); }

  .stats-bar .stats-provider-count {
    color: var(--text-primary);
    font-weight: 600;
  }

  .stats-bar .stats-provider-name {
    color: var(--text-secondary);
  }

  /* ── Events Container ── */
  .events {
    padding: 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 120px 40px;
    color: var(--text-dim);
    font-size: 16px;
  }

  .empty-state .big {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* ── Event Card ── */
  .event {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
    animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    transition: border-color 0.15s;
  }

  .event:hover {
    border-color: var(--border);
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .event-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: default;
    flex-wrap: wrap;
  }

  .provider-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .provider-badge.openai { background: var(--openai); color: #fff; }
  .provider-badge.anthropic { background: var(--anthropic); color: #fff; }
  .provider-badge.vertexai { background: var(--vertexai); color: #fff; }
  .provider-badge.bedrock { background: var(--bedrock); color: #111; }
  .provider-badge.azure_openai { background: var(--azure); color: #111; }

  .method-path {
    font-size: 13px;
    color: var(--text-primary);
    flex-shrink: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .method-path .method {
    color: var(--accent-green);
    font-weight: 600;
    margin-right: 6px;
  }

  .status-code {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .status-code.ok { background: rgba(61, 214, 140, 0.15); color: var(--accent-green); }
  .status-code.err { background: rgba(240, 80, 110, 0.15); color: var(--accent-red); }

  .latency {
    font-size: 12px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .client-ip {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .timestamp {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* ── Collapsible Sections ── */
  .event-body {
    border-top: 1px solid var(--border-subtle);
  }

  .section-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
  }

  .section-toggle:hover { color: var(--text-secondary); }

  .section-toggle .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .section-toggle.open .arrow { transform: rotate(90deg); }

  .section-content {
    display: none;
    padding: 0 16px 12px 16px;
  }

  .section-content.open { display: block; }

  pre.json {
    background: var(--bg-section);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  /* JSON syntax colors */
  .json-key { color: #7aa2f7; }
  .json-string { color: #9ece6a; }
  .json-number { color: #ff9e64; }
  .json-bool { color: #bb9af7; }
  .json-null { color: #565f89; }

  /* ── Conversation Badge ── */
  .conv-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    border: 1px solid transparent;
  }

  .conv-badge:hover {
    filter: brightness(1.3);
    border-color: rgba(255,255,255,0.2);
  }

  .turn-label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── Conversations View ── */
  .conversations-view {
    display: none;
    padding: 20px 32px;
    flex-direction: column;
    gap: 16px;
  }

  .conversations-view.active { display: flex; }
  .events.hidden { display: none; }

  .conv-thread {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
    animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .conv-thread-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 0.15s;
  }

  .conv-thread-header:hover { background: var(--bg-card-hover); }

  .conv-thread-id {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
  }

  .conv-thread-meta {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    gap: 16px;
  }

  .conv-thread-meta strong {
    color: var(--text-primary);
  }

  .conv-thread-messages {
    display: none;
    padding: 0;
  }

  .conv-thread-messages.open { display: block; }

  .conv-message {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .conv-message:last-child { border-bottom: none; }

  .conv-message-role {
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
    flex-shrink: 0;
    min-width: 70px;
    text-align: center;
  }

  .conv-message-role.user {
    background: rgba(66, 133, 244, 0.15);
    color: #4285f4;
  }

  .conv-message-role.assistant {
    background: rgba(61, 214, 140, 0.15);
    color: var(--accent-green);
  }

  .conv-message-role.system {
    background: rgba(187, 154, 247, 0.15);
    color: #bb9af7;
  }

  .conv-message-content {
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 120px;
    overflow-y: auto;
    flex: 1;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a2a3a; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">LLM Katan<span>Live Dashboard</span></div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>
  <div class="header-right">
    <div class="stat"><strong id="eventCount">0</strong> events</div>
    <div class="stat"><strong id="convoCount">0</strong> convos</div>
    <button class="btn active" id="viewEventsBtn" onclick="switchView('events')">Events</button>
    <button class="btn" id="viewConvosBtn" onclick="switchView('conversations')">Conversations</button>
    <button class="btn active" id="autoScrollBtn" onclick="toggleAutoScroll()">Auto-scroll</button>
    <button class="btn" onclick="clearEvents()">Clear</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <span class="stats-label">Lifetime</span>
  <span><span class="stats-total" id="statsTotal">—</span><span class="stats-total-label">requests</span></span>
  <div class="stats-providers" id="statsProviders"></div>
</div>

<div class="conversations-view" id="conversationsView"></div>
<div class="events" id="events">
  <div class="empty-state" id="emptyState">
    <div class="big">&#x2302;</div>
    Waiting for requests...<br>
    <span style="font-size:12px; margin-top:8px; display:inline-block;">
      Send a request to any provider endpoint to see it here
    </span>
  </div>
</div>

<script>
const MAX_EVENTS = 100;
let autoScroll = true;
let eventCount = 0;
let ws = null;
let currentView = 'events';

const CONV_COLORS = [
  '#3dd68c', '#f0506e', '#4285f4', '#f5a623', '#a78bfa',
  '#d97706', '#06b6d4', '#ec4899', '#84cc16', '#f97316',
  '#8b5cf6', '#14b8a6', '#ef4444', '#6366f1', '#eab308',
];
const convColorMap = {};
let colorIndex = 0;
const convEvents = {};  // conv_id → [{evt, turnNum}]

function getConvColor(convId) {
  if (!convId) return null;
  if (!convColorMap[convId]) {
    convColorMap[convId] = CONV_COLORS[colorIndex % CONV_COLORS.length];
    colorIndex++;
  }
  return convColorMap[convId];
}

function extractConvId(evt) {
  const resp = evt.response_body;
  if (!resp) return null;
  return resp.conversation_id || resp.conversationId || resp.sessionId
    || (resp.metadata && resp.metadata.conversation_id) || null;
}

function extractTurnFromResp(evt) {
  const convId = extractConvId(evt);
  if (!convId) return null;
  if (!convEvents[convId]) convEvents[convId] = [];
  const turnNum = convEvents[convId].length + 1;
  convEvents[convId].push({ evt, turnNum });
  return { convId, turnNum };
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/events`);

  ws.onopen = () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Reconnecting...';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (msg) => {
    try {
      const event = JSON.parse(msg.data);
      addEvent(event);
    } catch(e) {}
  };
}

function addEvent(evt) {
  const container = document.getElementById('events');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  eventCount++;
  document.getElementById('eventCount').textContent = eventCount;

  const card = document.createElement('div');
  card.className = 'event';

  const providerRaw = evt.provider || 'unknown';
  const providerClass = providerRaw.startsWith('bedrock') ? 'bedrock' : providerRaw.startsWith('vertexai') ? 'vertexai' : providerRaw.replace(/[^a-z_]/g, '');
  const providerLabel = {
    'openai': 'OpenAI',
    'anthropic': 'Anthropic',
    'vertexai': 'Vertex AI',
    'bedrock': 'Bedrock',
    'azure_openai': 'Azure',
  }[providerClass] || providerRaw;
  // Show full label for openai-compat variants
  const displayLabel = providerRaw === 'bedrock (openai-compat)' ? 'Bedrock (OpenAI)'
    : providerRaw === 'vertexai (openai-compat)' ? 'Vertex (OpenAI)'
    : providerLabel;

  const statusOk = evt.status_code >= 200 && evt.status_code < 400;
  const statusClass = statusOk ? 'ok' : 'err';

  const time = new Date(evt.timestamp || Date.now()).toLocaleTimeString('en-US', {
    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3
  });

  const convInfo = extractTurnFromResp(evt);
  const convId = convInfo ? convInfo.convId : null;
  const turnNum = convInfo ? convInfo.turnNum : null;
  const convColor = getConvColor(convId);

  let convBadgeHtml = '';
  if (convId) {
    const shortId = convId.slice(0, 16) + '...';
    convBadgeHtml = `<span class="conv-badge" style="background:${convColor}22; color:${convColor}; border-color:${convColor}44" onclick="filterConversation('${convId}')" title="${convId}">${shortId}</span>`;
    convBadgeHtml += `<span class="turn-label">Turn ${turnNum}</span>`;
  }

  card.innerHTML = `
    <div class="event-header">
      <span class="provider-badge ${providerClass}">${displayLabel}</span>
      ${convBadgeHtml}
      <span class="method-path"><span class="method">${evt.method || 'POST'}</span>${evt.path || ''}</span>
      <span class="status-code ${statusClass}">${evt.status_code || '—'}</span>
      <span class="latency">${evt.latency_ms != null ? evt.latency_ms + 'ms' : ''}</span>
      <span class="client-ip">${evt.client_ip || ''}</span>
      <span class="timestamp">${time}</span>
    </div>
    <div class="event-body">
      ${makeSection('Request Headers', evt.request_headers)}
      ${makeSection('Request Body', evt.request_body)}
      ${makeSection('Response Body', evt.response_body)}
    </div>
  `;

  updateConvoCount();

  container.insertBefore(card, container.firstChild);

  // Remove old events
  while (container.children.length > MAX_EVENTS) {
    container.removeChild(container.lastChild);
  }

  if (autoScroll) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function makeSection(label, data) {
  if (!data) return '';
  const id = 's' + Math.random().toString(36).slice(2, 8);
  const json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  const highlighted = syntaxHighlight(json);
  return `
    <button class="section-toggle" onclick="toggleSection('${id}', this)">
      <span class="arrow">&#9654;</span> ${label}
    </button>
    <div class="section-content" id="${id}">
      <pre class="json">${highlighted}</pre>
    </div>
  `;
}

function toggleSection(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function syntaxHighlight(json) {
  // Escape HTML first
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Tokenize and colorize in one pass to avoid double-matching
  return json.replace(
    /("(?:[^"\\]|\\.)*")\s*:|("(?:[^"\\]|\\.)*")|(\b\d+\.?\d*\b)|\b(true|false)\b|(null)/g,
    function(match, key, str, num, bool, nil) {
      if (key) return '<span class="json-key">' + key + '</span>:';
      if (str) return '<span class="json-string">' + str + '</span>';
      if (num) return '<span class="json-number">' + num + '</span>';
      if (bool) return '<span class="json-bool">' + bool + '</span>';
      if (nil) return '<span class="json-null">null</span>';
      return match;
    }
  );
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  const btn = document.getElementById('autoScrollBtn');
  btn.classList.toggle('active', autoScroll);
}

function clearEvents() {
  const container = document.getElementById('events');
  container.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="big">&#x2302;</div>
      Waiting for requests...<br>
      <span style="font-size:12px; margin-top:8px; display:inline-block;">
        Send a request to any provider endpoint to see it here
      </span>
    </div>
  `;
  eventCount = 0;
  document.getElementById('eventCount').textContent = '0';
}

const PROVIDER_NAMES = {
  'openai': 'OpenAI',
  'anthropic': 'Anthropic',
  'vertexai': 'Vertex AI',
  'bedrock': 'Bedrock',
  'azure_openai': 'Azure',
};

function providerClass(name) {
  if (name.startsWith('bedrock')) return 'bedrock';
  if (name.startsWith('vertexai')) return 'vertexai';
  return name.replace(/[^a-z_]/g, '');
}

async function fetchStats() {
  try {
    const resp = await fetch('/stats');
    const data = await resp.json();
    document.getElementById('statsTotal').textContent = data.total.toLocaleString();
    const container = document.getElementById('statsProviders');
    container.innerHTML = '';
    for (const [name, count] of Object.entries(data.providers)) {
      const cls = providerClass(name);
      const label = PROVIDER_NAMES[cls] || name;
      container.innerHTML += `
        <div class="stats-provider">
          <div class="stats-provider-dot ${cls}"></div>
          <span class="stats-provider-count">${count.toLocaleString()}</span>
          <span class="stats-provider-name">${label}</span>
        </div>`;
    }
  } catch(e) {}
}

function updateConvoCount() {
  document.getElementById('convoCount').textContent = Object.keys(convEvents).length;
}

function switchView(view) {
  currentView = view;
  const eventsEl = document.getElementById('events');
  const convosEl = document.getElementById('conversationsView');
  const eventsBtn = document.getElementById('viewEventsBtn');
  const convosBtn = document.getElementById('viewConvosBtn');

  if (view === 'events') {
    eventsEl.classList.remove('hidden');
    convosEl.classList.remove('active');
    eventsBtn.classList.add('active');
    convosBtn.classList.remove('active');
  } else {
    eventsEl.classList.add('hidden');
    convosEl.classList.add('active');
    eventsBtn.classList.remove('active');
    convosBtn.classList.add('active');
    renderConversationsView();
  }
}

function renderConversationsView() {
  const container = document.getElementById('conversationsView');

  if (Object.keys(convEvents).length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big">&#x2302;</div>No conversations yet</div>`;
    return;
  }

  container.innerHTML = '';
  const sorted = Object.entries(convEvents).sort((a, b) => {
    const lastA = a[1][a[1].length - 1].evt.timestamp || 0;
    const lastB = b[1][b[1].length - 1].evt.timestamp || 0;
    return lastB - lastA;
  });

  for (const [convId, turns] of sorted) {
    const color = getConvColor(convId);
    const provider = turns[0].evt.provider || 'unknown';
    const provCls = provider.startsWith('bedrock') ? 'bedrock' : provider.startsWith('vertexai') ? 'vertexai' : provider.replace(/[^a-z_]/g, '');
    const threadId = 'thread_' + convId.replace(/[^a-z0-9]/gi, '');

    let messagesHtml = '';
    for (const { evt, turnNum } of turns) {
      const reqBody = evt.request_body || {};
      const respBody = evt.response_body || {};

      let userMsg = '';
      const msgs = reqBody.messages || (reqBody.contents ? null : null);
      if (reqBody.messages && reqBody.messages.length > 0) {
        const last = reqBody.messages[reqBody.messages.length - 1];
        userMsg = last.content || (last.parts && last.parts[0] && last.parts[0].text) || '';
        if (typeof userMsg !== 'string' && Array.isArray(userMsg)) {
          userMsg = userMsg.map(b => b.text || '').join('');
        }
      } else if (reqBody.contents && reqBody.contents.length > 0) {
        const last = reqBody.contents[reqBody.contents.length - 1];
        userMsg = last.parts ? last.parts.map(p => p.text || '').join('') : '';
      }

      let assistantMsg = '';
      if (respBody.choices && respBody.choices[0]) {
        assistantMsg = respBody.choices[0].message ? respBody.choices[0].message.content : '';
      } else if (respBody.content && respBody.content[0]) {
        assistantMsg = respBody.content[0].text || '';
      } else if (respBody.candidates && respBody.candidates[0]) {
        assistantMsg = respBody.candidates[0].content.parts[0].text || '';
      } else if (respBody.output && respBody.output.message) {
        assistantMsg = respBody.output.message.content[0].text || '';
      }

      const truncUser = userMsg.length > 300 ? userMsg.slice(0, 300) + '...' : userMsg;
      const truncAssist = assistantMsg.length > 300 ? assistantMsg.slice(0, 300) + '...' : assistantMsg;

      messagesHtml += `
        <div class="conv-message">
          <span class="conv-message-role user">User</span>
          <span class="conv-message-content">${escapeHtml(truncUser)}</span>
        </div>
        <div class="conv-message">
          <span class="conv-message-role assistant">Assistant</span>
          <span class="conv-message-content">${escapeHtml(truncAssist)}</span>
        </div>`;
    }

    const shortId = convId.slice(0, 20) + '...';
    const thread = document.createElement('div');
    thread.className = 'conv-thread';
    thread.innerHTML = `
      <div class="conv-thread-header" onclick="document.getElementById('${threadId}').classList.toggle('open')">
        <span class="conv-thread-id" style="background:${color}22; color:${color}">${shortId}</span>
        <span class="provider-badge ${provCls}" style="font-size:10px; padding:2px 8px">${provCls}</span>
        <span class="conv-thread-meta">
          <span><strong>${turns.length}</strong> turns</span>
          <span><strong>${turns.length * 2}</strong> messages</span>
        </span>
      </div>
      <div class="conv-thread-messages" id="${threadId}">
        ${messagesHtml}
      </div>`;
    container.appendChild(thread);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function filterConversation(convId) {
  switchView('conversations');
  const threadId = 'thread_' + convId.replace(/[^a-z0-9]/gi, '');
  setTimeout(() => {
    const el = document.getElementById(threadId);
    if (el) {
      el.classList.add('open');
      el.parentElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 100);
}

fetchStats();
setInterval(fetchStats, 5000);

connect();
</script>
